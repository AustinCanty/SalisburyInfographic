<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salisbury Coastal Resilience Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --top:#113f5d;        /* gradient top */
    --bottom:#113f5d;     /* gradient bottom */
    --teal:#438486;       /* accent 1 */
    --rust:#a85848;       /* accent 2 */
    --blue:#547aa8;       /* accent 3 */
    --white:#ffffff;
    --body:#bebdb1;       /* body text (read from #bebd1) */
    --panel:rgba(255,255,255,.05);
    --panelline:rgba(190,189,177,.22);
    --track:rgba(190,189,177,.16);
    /* StoryMap fonts (Ocean Sans / Mahsuri Sans) fall back to a humanist sans */
    --display:"Ocean Sans","Mulish",system-ui,sans-serif;
    --text:"Mahsuri Sans","Mulish",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--text);
    color:var(--body);
    background:linear-gradient(180deg,var(--top) 0%,#113f5d 50%,var(--bottom) 100%);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:clamp(28px,4.5vw,64px) clamp(20px,4vw,56px) clamp(40px,5vw,72px);
  }

  /* ---------- HERO ---------- */
  header{position:relative;padding-bottom:clamp(20px,3vw,34px);margin-bottom:clamp(26px,3.4vw,42px)}
  .eyebrow{font-size:clamp(10px,1.1vw,12px);letter-spacing:.32em;text-transform:uppercase;color:var(--teal);font-weight:800;margin-bottom:18px}
  h1{font-family:var(--display);color:var(--white);font-weight:800;
     font-size:clamp(34px,6vw,68px);line-height:1.0;letter-spacing:-.01em;max-width:16ch}
  h1 em{font-style:normal;color:var(--blue)}
  .sub{margin-top:18px;font-size:clamp(14px,1.5vw,18px);line-height:1.55;max-width:64ch;color:var(--body)}

  .emphasis-message{
    color:#78dfc6;
    font-weight:700;
    font-size:calc(clamp(14px,1.5vw,18px) * 2);
  }
  .nbadge{position:absolute;top:4px;right:0;text-align:right}
  .nbadge .num{font-family:var(--display);font-size:clamp(48px,7vw,84px);font-weight:900;color:var(--white);line-height:.8}
  .nbadge .lab{font-size:clamp(9px,1vw,11px);letter-spacing:.24em;text-transform:uppercase;color:var(--teal);font-weight:800;margin-top:4px}
  .waveline{margin-top:clamp(18px,2.6vw,30px);width:100%;height:30px;display:block;opacity:.6}

  /* ---------- GRID HELPERS ---------- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(18px,2.4vw,30px)}
  section.block{margin-bottom:clamp(26px,3.4vw,44px)}

  /* ---------- CARDS ---------- */
  .card{background:var(--panel);border:1px solid var(--panelline);border-radius:18px;
        padding:clamp(20px,2.4vw,30px);backdrop-filter:blur(2px)}
  .kpi{font-family:var(--display);font-weight:900;color:var(--white);
       font-size:clamp(52px,8vw,90px);line-height:.82}
  .kpi span{font-size:.42em;vertical-align:super;color:var(--teal)}
  .ctitle{font-family:var(--display);color:var(--white);font-weight:700;
          font-size:clamp(15px,1.7vw,20px);margin-top:10px}
  .cnote{font-size:clamp(12px,1.3vw,14px);color:var(--body);margin-top:8px;line-height:1.5}

  /* concern bar */
  .concern{display:flex;height:22px;border-radius:8px;overflow:hidden;margin-top:18px}
  .concern i{display:block;height:100%}
  .legend{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;font-size:clamp(11px,1.2vw,13px);font-weight:600}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:middle}

  /* icon array */
  .icons{display:grid;grid-template-columns:repeat(19,1fr);gap:4px;margin-top:18px}
  .icons span{aspect-ratio:1;border-radius:3px;background:var(--track)}
  .icons span.on{background:var(--blue)}

  /* ---------- SECTION TITLES ---------- */
  .sec{display:flex;align-items:baseline;gap:14px;margin-bottom:clamp(16px,2vw,24px)}
  .sec h2{font-family:var(--display);color:var(--white);font-weight:700;font-size:clamp(20px,2.6vw,30px);white-space:nowrap}
  .sec .tag{font-size:clamp(9px,1vw,11px);letter-spacing:.22em;text-transform:uppercase;font-weight:800}
  .sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--panelline),transparent)}

  /* ---------- BAR ROWS ---------- */
  .sublabel{font-size:clamp(10px,1.1vw,12px);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
  .barrow{margin-bottom:clamp(11px,1.4vw,16px)}
  .barrow .l{display:flex;justify-content:space-between;align-items:baseline;font-size:clamp(12px,1.35vw,15px);font-weight:600;color:var(--body);margin-bottom:6px}
  .barrow .l b{font-family:var(--display);font-weight:900;color:var(--white);font-size:1.08em}
  .track{height:14px;background:var(--track);border-radius:8px;overflow:hidden}
  .fill{height:100%;border-radius:8px}
  .fill.rust{background:linear-gradient(90deg,var(--rust),#c47a6c)}
  .fill.teal{background:linear-gradient(90deg,var(--teal),#6fb0b1)}
  .fill.blue{background:linear-gradient(90deg,var(--blue),#7e9ec9)}

  /* ---------- ENGAGE PANEL ---------- */
  .engage{background:rgba(8,33,49,.55);border:1px solid var(--panelline);border-radius:18px;padding:clamp(20px,2.4vw,30px)}
  .engage h3{font-family:var(--display);color:var(--white);font-weight:700;font-size:clamp(15px,1.7vw,19px);margin-bottom:18px}
  .erow{display:flex;align-items:center;gap:14px;margin-bottom:15px}
  .erow .big{font-family:var(--display);font-weight:900;color:var(--blue);font-size:clamp(30px,4vw,42px);line-height:.8;min-width:1.9em;text-align:right}
  .erow .big span{font-size:.5em}
  .erow .txt{font-size:clamp(12px,1.3vw,14px);line-height:1.45}
  .erow .txt b{color:var(--white);font-weight:700}
  .when{margin-top:6px;border-top:1px solid var(--panelline);padding-top:16px;font-size:clamp(11px,1.2vw,13px)}
  .when>b{color:var(--white)}
  .whenbar{display:flex;gap:8px;margin-top:12px}
  .whenbar div{flex:1;text-align:center}
  .whenbar .v{font-family:var(--display);font-weight:900;font-size:clamp(18px,2.2vw,24px);color:var(--white)}
  .whenbar .v.hot{color:var(--rust)}
  .whenbar .k{font-size:clamp(8px,.95vw,10px);letter-spacing:.05em;text-transform:uppercase;color:var(--teal);margin-top:4px}

  .nbnote{font-size:clamp(11px,1.2vw,13px);color:var(--body);margin-top:14px;line-height:1.5}
  .nbnote b{color:var(--white)}

  /* ---------- FOOTER ---------- */
  footer{margin-top:clamp(30px,4vw,52px);padding-top:20px;border-top:1px solid var(--panelline);
         display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;
         font-size:clamp(10px,1.1vw,12px);color:var(--body)}
  footer b{font-family:var(--display);color:var(--white);font-weight:800;letter-spacing:.04em}

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:760px){
    .grid2{grid-template-columns:1fr}
    .nbadge{position:static;text-align:left;margin-bottom:18px}
    .icons{grid-template-columns:repeat(15,1fr)}
    .sec h2{white-space:normal}
  }
  @media (prefers-reduced-motion:no-preference){
    .fill,.concern i{animation:grow .9s cubic-bezier(.2,.8,.2,1) both}
    @keyframes grow{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="nbadge">
      <div class="num">95</div>
      <div class="lab">Responses</div>
    </div>
    <h1>The tide is rising, <em>and so is concern.</em></h1>
    
<p class="sub">Here's what Salisbury told us.</p><p class="sub emphasis-message">"The community’s message is clear: protect Salisbury through smarter planning, stronger infrastructure, and restoration of the natural systems that have always defended our coast.</p>
    <svg class="waveline" viewBox="0 0 1180 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,18 C150,4 300,4 450,16 C600,28 750,28 900,16 C1000,8 1100,8 1180,12" fill="none" stroke="#438486" stroke-width="2"></path>
      <path d="M0,24 C150,12 300,12 450,22 C600,32 750,32 900,22 C1000,16 1100,16 1180,19" fill="none" stroke="#547aa8" stroke-width="1.5" opacity=".6"></path>
    </svg>
  </header>
  
</div>

<script>
  const wrap=document.getElementById('icons');
  for(let i=0;i<95;i++){const s=document.createElement('span');if(i<66)s.className='on';wrap.appendChild(s);}
</script>
